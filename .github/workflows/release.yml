name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      snipeit_version:
        description: 'Snipe-IT base image tag (e.g. v8.5.0)'
        required: false
        default: 'v8.5.0'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEFAULT_SNIPEIT_VERSION: v8.5.0

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # examples/Dockerfile expects `snipeit-oidc/` to sit next to it as the
      # build context. Check out into that path so we can reuse it unchanged.
      - uses: actions/checkout@v6
        with:
          path: snipeit-oidc

      - name: Resolve Snipe-IT base version
        id: base
        run: |
          version="${{ github.event.inputs.snipeit_version }}"
          version="${version:-${DEFAULT_SNIPEIT_VERSION}}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag rules:
          #   git tag v1.2.3      -> 1.2.3, 1.2, 1, latest
          #   push main           -> edge
          #   any                 -> sha-<short>
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=snipeit-oidc
            org.opencontainers.image.description=Snipe-IT with the OIDC plugin baked in
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            io.snipeit.base.version=${{ steps.base.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the parent of the checkout so `COPY snipeit-oidc`
          # in examples/Dockerfile resolves correctly.
          context: .
          file: ./snipeit-oidc/examples/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SNIPEIT_VERSION=${{ steps.base.outputs.version }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
