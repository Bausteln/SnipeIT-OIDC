name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Snipe-IT v8 requires PHP 8.2+ (v8.5.0 recommends 8.4+). We test the
        # full supported range so a future contributor doesn't ship code that
        # only parses on the newest runtime, and so version-skewed installs
        # are covered.
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        # --no-check-publish: we install via path repository, not Packagist,
        # so we don't need homepage/keywords/authors metadata.
        run: composer validate --strict --no-check-publish

      - name: php -l (syntax check)
        run: |
          set -e
          files=$(find src config routes -type f -name "*.php")
          if [ -z "$files" ]; then
            echo "No PHP files found to lint" >&2
            exit 1
          fi
          for f in $files; do
            echo "Linting $f"
            php -l "$f"
          done

      - name: Resolve dependencies
        # Catches breakage from upstream conflicts before they hit users.
        run: composer install --no-progress --no-interaction --prefer-dist
